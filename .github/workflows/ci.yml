name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Start SUT
      run: |
        java -jar artifacts/app-mbank.jar &
        sleep 5
    
    - name: Run tests
      run: ./gradlew test
    
    - name: Stop SUT
      if: always()
      run: |
        pkill -f app-mbank.jar || true
