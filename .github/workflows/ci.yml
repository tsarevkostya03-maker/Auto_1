name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Start SUT
      run: |
        java -jar artifacts/app-mbank.jar &
        sleep 5

    - name: Run tests
      run: ./gradlew test --info

    - name: Stop SUT
      if: always()
      run: kill $(lsof -t -i:9999) || true